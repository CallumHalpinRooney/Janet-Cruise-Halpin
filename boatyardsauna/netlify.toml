# The Boat Yard Sauna — deployed as its OWN Netlify site, separate from
# Janet's site in the repo root. When creating the Netlify site, set the
# site's "Base directory" to `boatyardsauna` and this config takes over.
[build]
  base = "boatyardsauna"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Long-cache static assets, always-fresh HTML.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
